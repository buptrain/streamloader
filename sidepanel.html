<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>StreamLoader</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <header>
      <h1>StreamLoader</h1>
      <div class="actions">
        <button id="refresh" title="Refresh list">Refresh</button>
        <button id="clear" title="Clear this tab's list">Clear</button>
      </div>
    </header>

    <div id="status" class="status"></div>

    <div id="toast" class="toast" hidden></div>

    <ul id="list" class="stream-list"></ul>

    <template id="item-template">
      <li class="stream-item">
        <div class="thumb">
          <div class="thumb-placeholder" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M8 5v14l11-7z" />
            </svg>
          </div>
          <img class="thumb-img" alt="" hidden />
        </div>
        <div class="meta">
          <div class="row">
            <span class="index"></span>
            <span class="filename"></span>
            <span class="resolution" hidden></span>
          </div>
          <div class="row actions">
            <button class="copy">Copy URL</button>
            <button class="open">Open</button>
            <button class="download">Download</button>
          </div>
        </div>
      </li>
    </template>

    <script src="sidepanel.js"></script>
  </body>
</html>
